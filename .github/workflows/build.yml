name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write
  id-token: write

jobs:
  version:
    name: Compute build version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      changed: ${{ steps.meta.outputs.changed }}
    steps:
    - uses: actions/checkout@v4
    - name: Extract version and check for changes
      id: meta
      run: |
        VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
        TAG="v${VERSION}"
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
        if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
          echo "Tag ${TAG} already exists — version has not changed."
          echo "changed=false" >> "$GITHUB_OUTPUT"
        else
          echo "Tag ${TAG} not found — version has changed."
          echo "changed=true" >> "$GITHUB_OUTPUT"
        fi

  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: version
    if: needs.version.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4
    - name: Build wheels
      uses: pypa/cibuildwheel@v2.21.3
      env:
        CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*"
        CIBW_SKIP: "*-musllinux_*"
    - name: Store built wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}
        path: wheelhouse/*.whl

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version, build-wheels]
    if: needs.version.outputs.changed == 'true' && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
    - name: Download wheel artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: wheels-*
        path: release-assets
        merge-multiple: true
    - name: Publish release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.version.outputs.tag }}
        name: ${{ needs.version.outputs.tag }}
        prerelease: false
        generate_release_notes: true
        files: release-assets/*.whl

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [version, release]
    if: needs.version.outputs.changed == 'true' && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment: pypi
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install build dependencies
      run: pip install build

    - name: Build sdist
      run: python -m build --sdist

    - name: Download wheels from release
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh release download "${{ needs.version.outputs.tag }}" --pattern "*.whl" --dir dist/

    - uses: pypa/gh-action-pypi-publish@release/v1
